  - launch_app_sim
  - snapshot_ui
  - tap
  - tap
  - type_text
  - type_text
  - type_text
  - tap
  - type_text
  - tap
  - type_text
  - tap
failurePatterns:
  - STALE_ELEMENT_REF
  - SNAPSHOT_MISSING
  - WAIT_TIMEOUT
