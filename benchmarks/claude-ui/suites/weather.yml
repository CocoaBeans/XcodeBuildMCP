name: weather
prompt: ../prompts/weather.md
workingDirectory: example_projects/Weather
sessionDefaults:
  projectPath: Weather.xcodeproj
  scheme: Weather
  simulatorName: iPhone 17 Pro Max
baseline:
  totalToolCalls: 14
  trackedToolCalls: 13
  mcpToolCalls: 13
  uiAutomationCalls: 11
  wallClockSeconds: 100.03
  tools:
    session_show_defaults: 1
    build_run_sim: 1
    snapshot_ui: 2
    tap: 6
    batch: 1
    type_text: 1
    swipe: 1
baselineToolSequence:
  - session_show_defaults
  - build_run_sim
  - snapshot_ui
  - tap
  - batch
  - tap
  - tap
  - type_text
  - tap
  - tap
  - swipe
  - snapshot_ui
  - tap
failurePatterns:
  - STALE_ELEMENT_REF
  - SNAPSHOT_MISSING
  - WAIT_TIMEOUT
